<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAT Vocab</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0d;
    --card: #161616;
    --border: #2a2a2a;
    --accent: #e8c547;
    --text: #f0f0f0;
    --muted: #666;
    --green: #4caf72;
    --red: #e05c5c;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px;
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: 2rem;
    color: var(--accent);
    margin-bottom: 6px;
    letter-spacing: -0.5px;
  }

  .subtitle {
    color: var(--muted);
    font-size: 0.75rem;
    margin-bottom: 32px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .controls {
    display: flex;
    gap: 10px;
    margin-bottom: 28px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .mode-btn {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 8px 18px;
    border-radius: 4px;
    cursor: pointer;
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    letter-spacing: 1px;
    text-transform: uppercase;
    transition: all 0.2s;
  }

  .mode-btn.active, .mode-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  /* FLASHCARD */
  .flashcard-wrap {
    perspective: 1200px;
    width: 100%;
    max-width: 520px;
    height: 280px;
    cursor: pointer;
    margin-bottom: 24px;
  }

  .flashcard {
    width: 100%; height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.5s cubic-bezier(.4,0,.2,1);
  }

  .flashcard.flipped { transform: rotateY(180deg); }

  .face {
    position: absolute;
    inset: 0;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    backface-visibility: hidden;
    padding: 32px;
    text-align: center;
  }

  .face.back { transform: rotateY(180deg); }

  .face-label {
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 16px;
  }

  .word {
    font-family: 'Playfair Display', serif;
    font-size: 2.4rem;
    color: var(--accent);
    margin-bottom: 8px;
  }

  .pos {
    font-size: 0.7rem;
    color: var(--muted);
    font-style: italic;
    margin-bottom: 0;
  }

  .definition {
    font-size: 0.9rem;
    line-height: 1.7;
    color: var(--text);
    margin-bottom: 16px;
  }

  .example {
    font-size: 0.78rem;
    color: var(--muted);
    font-style: italic;
    line-height: 1.6;
    border-left: 2px solid var(--border);
    padding-left: 12px;
    text-align: left;
  }

  .hint {
    font-size: 0.68rem;
    color: var(--muted);
    margin-top: 12px;
    letter-spacing: 1px;
  }

  /* ACTIONS */
  .actions {
    display: flex;
    gap: 12px;
    margin-bottom: 28px;
  }

  .btn {
    padding: 10px 28px;
    border-radius: 6px;
    border: none;
    font-family: 'DM Mono', monospace;
    font-size: 0.8rem;
    cursor: pointer;
    letter-spacing: 1px;
    text-transform: uppercase;
    transition: opacity 0.2s, transform 0.1s;
  }
  .btn:active { transform: scale(0.97); }
  .btn-know { background: var(--green); color: #000; }
  .btn-skip { background: var(--red); color: #fff; }
  .btn-next { background: var(--accent); color: #000; }

  /* PROGRESS */
  .progress-bar-wrap {
    width: 100%;
    max-width: 520px;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin-bottom: 10px;
    overflow: hidden;
  }

  .progress-bar {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 0.4s;
  }

  .stats {
    display: flex;
    gap: 24px;
    font-size: 0.72rem;
    color: var(--muted);
    margin-bottom: 32px;
  }

  .stats span { color: var(--text); }

  /* QUIZ MODE */
  .quiz-wrap {
    width: 100%;
    max-width: 520px;
  }

  .quiz-question {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 28px;
    margin-bottom: 16px;
    text-align: center;
  }

  .quiz-word {
    font-family: 'Playfair Display', serif;
    font-size: 2rem;
    color: var(--accent);
    margin-bottom: 8px;
  }

  .quiz-instruction {
    font-size: 0.72rem;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .quiz-options {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 16px;
  }

  .opt-btn {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 14px 16px;
    border-radius: 8px;
    cursor: pointer;
    font-family: 'DM Mono', monospace;
    font-size: 0.78rem;
    line-height: 1.5;
    transition: all 0.2s;
    text-align: left;
  }

  .opt-btn:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
  .opt-btn.correct { border-color: var(--green); color: var(--green); background: #1a2e20; }
  .opt-btn.wrong { border-color: var(--red); color: var(--red); background: #2e1a1a; }
  .opt-btn:disabled { cursor: default; }

  .quiz-score {
    font-size: 0.75rem;
    color: var(--muted);
    text-align: center;
    margin-bottom: 16px;
  }

  /* RESULTS */
  .results {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 40px;
    text-align: center;
    max-width: 520px;
    width: 100%;
  }

  .results h2 {
    font-family: 'Playfair Display', serif;
    font-size: 1.8rem;
    color: var(--accent);
    margin-bottom: 12px;
  }

  .big-score {
    font-size: 3.5rem;
    font-weight: bold;
    margin: 16px 0;
  }

  .restart-btn {
    background: var(--accent);
    color: #000;
    border: none;
    padding: 12px 32px;
    border-radius: 6px;
    font-family: 'DM Mono', monospace;
    font-size: 0.85rem;
    cursor: pointer;
    margin-top: 20px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .hidden { display: none; }

  .counter {
    font-size: 0.72rem;
    color: var(--muted);
    text-align: center;
    margin-bottom: 8px;
  }
</style>
</head>
<body>

<h1>SAT Vocab</h1>
<p class="subtitle">1000 most common words</p>

<div class="controls">
  <button class="mode-btn active" onclick="setMode('flash')" id="btn-flash">Flashcards</button>
  <button class="mode-btn" onclick="setMode('quiz')" id="btn-quiz">Quiz</button>
  <button class="mode-btn" onclick="shuffle()">Shuffle</button>
  <button class="mode-btn" onclick="resetProgress()">Reset</button>
</div>

<!-- FLASHCARD MODE -->
<div id="flash-mode">
  <div class="progress-bar-wrap">
    <div class="progress-bar" id="progress-bar"></div>
  </div>
  <div class="stats">
    <div>Card <span id="card-num">1</span> of <span id="card-total">0</span></div>
    <div>Known <span id="known-count" style="color:var(--green)">0</span></div>
    <div>Skipped <span id="skip-count" style="color:var(--red)">0</span></div>
  </div>

  <div class="flashcard-wrap" onclick="flipCard()">
    <div class="flashcard" id="flashcard">
      <div class="face front">
        <div class="face-label">Word</div>
        <div class="word" id="flash-word">—</div>
        <div class="pos" id="flash-pos"></div>
        <div class="hint">tap to reveal</div>
      </div>
      <div class="face back">
        <div class="face-label">Definition</div>
        <div class="definition" id="flash-def"></div>
        <div class="example" id="flash-ex"></div>
      </div>
    </div>
  </div>

  <div class="actions">
    <button class="btn btn-skip" onclick="markCard(false)">✗ Skip</button>
    <button class="btn btn-next" onclick="nextCard()">Next →</button>
    <button class="btn btn-know" onclick="markCard(true)">✓ Know</button>
  </div>
</div>

<!-- QUIZ MODE -->
<div id="quiz-mode" class="hidden">
  <div class="progress-bar-wrap">
    <div class="progress-bar" id="quiz-progress-bar"></div>
  </div>
  <div class="quiz-score">
    Question <span id="q-num">1</span> of <span id="q-total">20</span> &nbsp;|&nbsp;
    Score: <span id="q-score" style="color:var(--accent)">0</span>
  </div>
  <div class="quiz-wrap">
    <div class="quiz-question">
      <div class="quiz-instruction">What does this word mean?</div>
      <div class="quiz-word" id="quiz-word">—</div>
    </div>
    <div class="quiz-options" id="quiz-options"></div>
  </div>
</div>

<!-- RESULTS -->
<div id="results-mode" class="hidden results">
  <h2>Done!</h2>
  <p id="results-msg" style="color:var(--muted);font-size:0.85rem"></p>
  <div class="big-score" id="results-score"></div>
  <p style="color:var(--muted);font-size:0.8rem">correct answers</p>
  <button class="restart-btn" onclick="restartQuiz()">Try Again</button>
  <br>
  <button class="restart-btn" style="background:var(--card);color:var(--text);border:1px solid var(--border);margin-top:10px" onclick="setMode('flash')">Back to Flashcards</button>
</div>

let words = [...RAW];
let currentIndex = 0;
let flipped = false;
let knownCount = 0;
let skipCount = 0;
let mode = 'flash';

// QUIZ
let quizWords = [];
let quizIndex = 0;
let quizScore = 0;
const QUIZ_SIZE = 20;
let quizAnswered = false;

function shuffle() {
  for (let i = words.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [words[i], words[j]] = [words[j], words[i]];
  }
  currentIndex = 0;
  knownCount = 0;
  skipCount = 0;
  updateFlashcard();
}

function resetProgress() {
  words = [...RAW];
  currentIndex = 0;
  knownCount = 0;
  skipCount = 0;
  flipped = false;
  updateFlashcard();
}

function setMode(m) {
  mode = m;
  document.getElementById('flash-mode').classList.toggle('hidden', m !== 'flash');
  document.getElementById('quiz-mode').classList.toggle('hidden', m !== 'quiz');
  document.getElementById('results-mode').classList.toggle('hidden', true);
  document.getElementById('btn-flash').classList.toggle('active', m === 'flash');
  document.getElementById('btn-quiz').classList.toggle('active', m === 'quiz');

  if (m === 'quiz') startQuiz();
  else updateFlashcard();
}

function flipCard() {
  flipped = !flipped;
  document.getElementById('flashcard').classList.toggle('flipped', flipped);
}

function updateFlashcard() {
  if (currentIndex >= words.length) {
    showFlashResults();
    return;
  }
  const w = words[currentIndex];
  document.getElementById('flash-word').textContent = w[0];
  document.getElementById('flash-pos').textContent = w[1];
  document.getElementById('flash-def').textContent = w[2];
  document.getElementById('flash-ex').textContent = w[3];
  document.getElementById('card-num').textContent = currentIndex + 1;
  document.getElementById('card-total').textContent = words.length;
  document.getElementById('known-count').textContent = knownCount;
  document.getElementById('skip-count').textContent = skipCount;
  document.getElementById('progress-bar').style.width = ((currentIndex / words.length) * 100) + '%';
  flipped = false;
  document.getElementById('flashcard').classList.remove('flipped');
}

function showFlashResults() {
  // just show a simple completion message
  document.getElementById('flash-word').textContent = '✓';
  document.getElementById('flash-pos').textContent = '';
  document.getElementById('flash-def').textContent = `Done! Known: ${knownCount} / ${words.length}`;
  document.getElementById('flash-ex').textContent = 'Press Shuffle or Reset to go again.';
}

function markCard(known) {
  if (known) knownCount++;
  else skipCount++;
  currentIndex++;
  updateFlashcard();
}

function nextCard() {
  currentIndex++;
  updateFlashcard();
}

// ---- QUIZ ----
function startQuiz() {
  quizWords = [...RAW].sort(() => Math.random() - 0.5).slice(0, QUIZ_SIZE);
  quizIndex = 0;
  quizScore = 0;
  quizAnswered = false;
  document.getElementById('q-total').textContent = QUIZ_SIZE;
  renderQuizQuestion();
}

function renderQuizQuestion() {
  if (quizIndex >= QUIZ_SIZE) {
    showQuizResults();
    return;
  }
  quizAnswered = false;
  const w = quizWords[quizIndex];
  document.getElementById('quiz-word').textContent = w[0];
  document.getElementById('q-num').textContent = quizIndex + 1;
  document.getElementById('q-score').textContent = quizScore;
  document.getElementById('quiz-progress-bar').style.width = ((quizIndex / QUIZ_SIZE) * 100) + '%';

  // pick 3 wrong answers
  const pool = RAW.filter(r => r[0] !== w[0]).sort(() => Math.random() - 0.5).slice(0, 3);
  const options = [...pool, w].sort(() => Math.random() - 0.5);

  const container = document.getElementById('quiz-options');
  container.innerHTML = '';
  options.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'opt-btn';
    btn.textContent = opt[2];
    btn.onclick = () => checkAnswer(btn, opt, w);
    container.appendChild(btn);
  });
}

function checkAnswer(btn, chosen, correct) {
  if (quizAnswered) return;
  quizAnswered = true;
  const btns = document.querySelectorAll('.opt-btn');
  btns.forEach(b => {
    b.disabled = true;
    if (b.textContent === correct[2]) b.classList.add('correct');
  });
  if (chosen[0] === correct[0]) {
    btn.classList.add('correct');
    quizScore++;
  } else {
    btn.classList.add('wrong');
  }
  document.getElementById('q-score').textContent = quizScore;
  setTimeout(() => {
    quizIndex++;
    renderQuizQuestion();
  }, 1000);
}

function showQuizResults() {
  document.getElementById('quiz-mode').classList.add('hidden');
  document.getElementById('results-mode').classList.remove('hidden');
  const pct = Math.round((quizScore / QUIZ_SIZE) * 100);
  document.getElementById('results-score').textContent = `${quizScore}/${QUIZ_SIZE}`;
  let msg = '';
  if (pct >= 90) msg = 'Excellent! You really know your SAT vocab.';
  else if (pct >= 70) msg = 'Good job! Keep reviewing the ones you missed.';
  else if (pct >= 50) msg = 'Not bad. More flashcard time will help!';
  else msg = 'Keep studying — you\'ll get there!';
  document.getElementById('results-msg').textContent = msg;
}

function restartQuiz() {
  document.getElementById('results-mode').classList.add('hidden');
  document.getElementById('quiz-mode').classList.remove('hidden');
  startQuiz();
}

// init
updateFlashcard();
</script>
